version: '3.8'

services:
  auth-service:
    build: 
      context: .
      dockerfile: Dockerfile.auth
    ports:
      - "50051:50051"
      - "9090:9090"

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_TARGET=auth-service:50051
      - JWT_SECRET=secret-key
    depends_on:
      - auth-service