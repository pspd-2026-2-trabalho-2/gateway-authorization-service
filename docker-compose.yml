version: '3.8'

services:
  auth-service:
    build: 
      context: .
      dockerfile: Dockerfile.auth
    ports:
      - "50052:50052"
      - "9091:9091"
    environment:
      - AUTH_GRPC_PORT=50052
      - AUTH_METRICS_PORT=9091
      - PATIENT_DATA_TARGET=host.docker.internal:50051
    extra_hosts:
      - "host.docker.internal:host-gateway"

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      - GATEWAY_PORT=8080
      - JWT_SECRET=secret-key
      - AUTH_SERVICE_TARGET=auth-service:50052
      - PATIENT_DATA_TARGET=host.docker.internal:50051
    depends_on:
      - auth-service
    extra_hosts:
      - "host.docker.internal:host-gateway"